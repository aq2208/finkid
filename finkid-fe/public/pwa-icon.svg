  <!-- Pig head -->
  <circle cx="256" cy="190" r="90" fill="#FFD4CE"/>
  <!-- Pig ears -->
  <ellipse cx="185" cy="140" rx="30" ry="40" fill="#FFB3A8"/>
  <ellipse cx="327" cy="140" rx="30" ry="40" fill="#FFB3A8"/>
  <!-- Pig snout -->
